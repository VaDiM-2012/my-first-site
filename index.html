<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простая страница</title>
    <style>
        /* Обнуление и базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Карточка-контейнер */
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.10);
        }

        /* Заголовок */
        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subhead {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 30px;
            font-weight: 400;
            border-bottom: 2px solid rgba(148, 163, 184, 0.2);
            padding-bottom: 18px;
        }

        /* Иконка / эмодзи */
        .emoji-big {
            font-size: 5rem;
            line-height: 1.2;
            margin-bottom: 10px;
            display: block;
        }

        /* Текст */
        .description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #334155;
            background: rgba(255, 255, 255, 0.5);
            padding: 18px 20px;
            border-radius: 28px;
            margin: 20px 0 28px 0;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Кнопка */
        .btn {
            display: inline-block;
            background: #1e293b;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px rgba(30, 41, 59, 0.15);
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: #0f172a;
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(30, 41, 59, 0.25);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Счетчик кликов (простое взаимодействие) */
        .click-counter {
            margin-top: 24px;
            font-size: 0.95rem;
            color: #64748b;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 18px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .click-counter span {
            font-weight: 600;
            color: #1e293b;
            font-size: 1.2rem;
            margin: 0 4px;
        }

        /* Нижний колонтитул */
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #94a3b8;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            padding-top: 24px;
            width: 100%;
            text-align: center;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .emoji-big {
                font-size: 4rem;
            }
            .description {
                font-size: 0.95rem;
                padding: 14px 16px;
            }
            .btn {
                padding: 14px 32px;
                font-size: 1rem;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Эмодзи / иконка -->
        <span class="emoji-big">✨</span>

        <!-- Заголовок -->
        <h1>Привет, мир!</h1>
        <div class="subhead">Это простая HTML-страница</div>

        <!-- Основной текст -->
        <div class="description">
            🌱 Здесь может быть ваш текст. <br>
            Страница создана с любовью к минимализму и чистоте.
        </div>

        <!-- Кнопка с интерактивом -->
        <button class="btn" id="actionButton">Нажми на меня</button>

        <!-- Счетчик кликов -->
        <div class="click-counter">
            👆 Кликов: <span id="clickCount">0</span>
        </div>
    </div>

    <!-- Футер -->
    <div class="footer">
        🕊️ Простота — высшая ступень мастерства
    </div>

    <!-- Небольшой скрипт для интерактива -->
    <script>
        (function() {
            const button = document.getElementById('actionButton');
            const counterSpan = document.getElementById('clickCount');

            // Инициализируем счетчик (храним в data-атрибуте или замыкании)
            let clicks = 0;

            // Функция обновления счетчика
            function updateCounter() {
                counterSpan.textContent = clicks;
            }

            // Обработчик нажатия
            button.addEventListener('click', function() {
                clicks++;
                updateCounter();

                // Небольшой визуальный фидбек: меняем цвет кнопки на мгновение
                button.style.backgroundColor = '#3b4a5e';
                setTimeout(() => {
                    button.style.backgroundColor = '#1e293b';
                }, 150);

                // Можно также менять текст кнопки (по желанию)
                if (clicks === 1) {
                    button.textContent = 'Ещё раз!';
                } else if (clicks === 5) {
                    button.textContent = 'Отлично!';
                } else if (clicks === 10) {
                    button.textContent = '🔥 10!';
                } else if (clicks === 20) {
                    button.textContent = 'Супер!';
                }
            });

            // Дополнительно: при загрузке устанавливаем начальное значение
            updateCounter();

            // Маленькая "фишка": если кликнуть 3 раза быстро — появляется сообщение
            let tripleTimer = null;
            let tripleCount = 0;
            button.addEventListener('click', function() {
                tripleCount++;
                clearTimeout(tripleTimer);
                tripleTimer = setTimeout(() => {
                    tripleCount = 0;
                }, 400);

                if (tripleCount === 3) {
                    // Небольшой сюрприз
                    const desc = document.querySelector('.description');
                    const originalText = desc.innerHTML;
                    desc.innerHTML = '🎉 Тройной клик! Вы мастер.';
                    desc.style.transition = 'background 0.2s';
                    desc.style.background = 'rgba(255, 215, 0, 0.15)';
                    setTimeout(() => {
                        desc.innerHTML = originalText;
                        desc.style.background = 'rgba(255, 255, 255, 0.5)';
                    }, 1500);
                    tripleCount = 0;
                }
            });

        })();
    </script>

</body>
</html>
